spring.application.name=demo
spring.data.mongodb.uri=mongodb://localhost:27017/studentdb
spring.data.mongodb.database=studentdb
server.port=8080
spring.datasource.url=jdbc:h2:mem:studentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true


# This creates the table if it doesn't exist, or updates it if we change the Java class
spring.jpa.hibernate.ddl-auto=update

# This prints the SQL commands to the console so we  can SEE what is happening as we run our application
spring.jpa.show-sql=true


spring.web.error.include-message=always
#so,that the error response received from server will have proper message